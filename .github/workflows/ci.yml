# .github/workflows/ci.yml
#
# Aevox CI Pipeline
#
# Triggers: pull_request (targeting main)
# Jobs:
#   build-linux        — GCC 13, CMake default preset
#   build-linux-asan   — GCC 13, CMake asan preset (ASan + UBSan)
#   build-windows      — MSVC 2022, CMake windows-msvc preset
#   format-check       — clang-format diff (no build)
#
# Supported platforms: Linux (GCC 13), Windows (MSVC 2022). macOS is not supported.
# Cache strategy: lukka/run-vcpkg keyed on hash of vcpkg.json

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — GCC 13, default preset (Debug, compile_commands.json)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (GCC 13)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GCC 13, CMake, and Ninja
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-13 g++-13 cmake ninja-build

      - name: Install vcpkg and restore binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (default preset)
        run: cmake --preset default
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Build (default preset)
        run: cmake --build --preset default

      - name: Test (default preset)
        run: ctest --preset default

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux — GCC 13, asan preset (AddressSanitizer + UndefinedBehaviorSanitizer)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux-asan:
    name: Build — Linux ASan + UBSan (GCC 13)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GCC 13, CMake, and Ninja
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-13 g++-13 cmake ninja-build

      - name: Install vcpkg and restore binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (asan preset)
        run: cmake --preset asan
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Build (asan preset)
        run: cmake --build --preset asan

      - name: Test (asan preset — ASan + UBSan)
        run: ctest --preset asan

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — MSVC 2022, Visual Studio 17 2022 generator (multi-config)
  # Uses the windows-msvc CMake preset (no Ninja required on Windows runners).
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (MSVC 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg and restore binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure (windows-msvc preset)
        run: cmake --preset windows-msvc

      - name: Build Debug (windows-msvc-debug preset)
        run: cmake --build --preset windows-msvc-debug

      - name: Test Debug (windows-msvc-debug preset)
        run: ctest --preset windows-msvc-debug

  # ─────────────────────────────────────────────────────────────────────────────
  # Format check — runs clang-format in-place and fails on any diff
  # Does not require a build or vcpkg.
  # ─────────────────────────────────────────────────────────────────────────────
  format-check:
    name: Format Check — clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-format

      - name: Run clang-format on all source files
        run: |
          find include src tests examples -name '*.hpp' -o -name '*.cpp' | \
            xargs clang-format -i

      - name: Fail if any format violations exist
        run: |
          git diff --exit-code || \
            (echo "::error::Format violations found — run clang-format locally and commit" && exit 1)

