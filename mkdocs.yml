site_name: Aevox
site_description: A modern C++23 web framework — zero-cost abstractions, maximum throughput
site_url: https://mohammadmokhalled.github.io/Aevox/
repo_url: https://github.com/MohammadMokhalled/Aevox
repo_name: MohammadMokhalled/Aevox

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Overview: guide/index.md
      - Installation: guide/installation.md
      - First HTTP Server: guide/first-http-server.md
      - Routing: guide/routing.md
      - Request and Response: guide/request-response.md
      - Async Patterns: guide/async-patterns.md
      - Error Handling: guide/error-handling.md
  - Architecture:
      - Overview: architecture/index.md
      - Executor: architecture/executor.md
      - Router: architecture/router.md
      - Coroutines: architecture/coroutines.md
      - Error Model: architecture/error-model.md
      - Layer Diagram: architecture/layer-diagram.md
  - API Reference:
      - Overview: api/index.md
      - Executor: api/executor.md
      - TcpStream: api/tcp_stream.md
      - Task: api/task.md
      - Async Helpers: api/async.md
      - Request and Response: api/request-response.md
      - Router and App: api/router.md
  - Examples:
      - Overview: examples/index.md
      - Hello World: examples/hello-world.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
